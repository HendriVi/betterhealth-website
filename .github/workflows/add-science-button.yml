name: Add Science Button

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch homepage science section
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          changed = False

          # Add the More button to the science section on the homepage.
          if 'data-i18n="science_more"' not in text:
              marker = '''        </div>
      </div>
    </section>

    <section class="section soft" id="programs">'''
              insert = '''        </div>
        <div class="section-actions science-more reveal" style="margin-top: 28px;">
          <a class="btn btn-primary" href="science.html" data-i18n="science_more">More</a>
        </div>
      </div>
    </section>

    <section class="section soft" id="programs">'''
              if marker not in text:
                  raise SystemExit('Could not find science-section insertion marker.')
              text = text.replace(marker, insert, 1)
              changed = True

          # Add German translation for the button.
          if 'science_more:' not in text:
              marker = '''        science_copy: "Das Gehirn arbeitet vorhersagend. Es interpretiert Körper, Welt und Zukunft über Modelle von Bedrohung, Sicherheit, Aufwand und Bedeutung. Wenn der Körper schlafdepriviert, entzündet, metabolisch fragil oder energetisch belastet ist, verändert sich Wahrnehmung.",
'''
              if marker in text:
                  text = text.replace(marker, marker + '''        science_more: "Mehr",
''', 1)
                  changed = True
              else:
                  print('Translation marker not found; leaving German fallback unchanged.')

          # Store selected language so science.html can open in the same language.
          if "betterhealth-language" not in text:
              marker = '''      activeLanguage = language;
      document.documentElement.lang = language;
'''
              replacement = '''      activeLanguage = language;
      try { localStorage.setItem("betterhealth-language", language); } catch (error) {}
      document.documentElement.lang = language;
'''
              if marker in text:
                  text = text.replace(marker, replacement, 1)
                  changed = True

          # Restore saved language on homepage load.
          old = '''    renderCase("fatigue");
  </script>'''
          new = '''    try {
      const savedLanguage = localStorage.getItem("betterhealth-language");
      if (savedLanguage === "de") {
        applyLanguage("de");
      } else {
        renderCase("fatigue");
      }
    } catch (error) {
      renderCase("fatigue");
    }
  </script>'''
          if old in text and 'savedLanguage' not in text:
              text = text.replace(old, new, 1)
              changed = True

          if changed:
              path.write_text(text, encoding='utf-8')
              print('Homepage patched.')
          else:
              print('Homepage already patched.')
          PY

      - name: Commit homepage patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Add more button to science section"
            git push
          fi
