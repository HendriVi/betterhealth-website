name: Add Science Button

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-homepage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Add science more button
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if 'data-i18n="science_more"' not in text:
              marker = '''        </div>
      </div>
    </section>

    <section class="section soft" id="programs">'''
              insert = '''        </div>
        <div class="section-actions science-more reveal" style="margin-top: 28px;">
          <a class="btn btn-primary" href="science.html" data-i18n="science_more">More</a>
        </div>
      </div>
    </section>

    <section class="section soft" id="programs">'''
              if marker in text:
                  text = text.replace(marker, insert, 1)
              else:
                  print('Science insertion marker not found. No homepage HTML insertion made.')

          if 'science_more:' not in text:
              marker = '''        science_copy: "Das Gehirn arbeitet vorhersagend. Es interpretiert Körper, Welt und Zukunft über Modelle von Bedrohung, Sicherheit, Aufwand und Bedeutung. Wenn der Körper schlafdepriviert, entzündet, metabolisch fragil oder energetisch belastet ist, verändert sich Wahrnehmung.",
'''
              if marker in text:
                  text = text.replace(marker, marker + '        science_more: "Mehr",\n', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No homepage changes needed."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Add More button to science section"
            git push
          fi
