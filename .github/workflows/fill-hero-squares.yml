name: Fill Hero Squares

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Fill empty hero squares
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const path = 'index.html';
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(file.data.content, 'base64').toString('utf8');
            let changed = false;

            const oldSquares = '<div class="scan-wall"><div class="scan"></div><div class="scan"></div><div class="scan"></div><div class="scan"></div></div>';
            const newSquares = '<div class="scan-wall"><div class="scan"><span>Sleep</span><small>72</small></div><div class="scan"><span>Stress</span><small>86</small></div><div class="scan"><span>Energy</span><small>43</small></div><div class="scan"><span>Metabolic</span><small>58</small></div></div>';
            if (text.includes(oldSquares)) {
              text = text.replace(oldSquares, newSquares);
              changed = true;
            }

            const cssMarker = '/* Filled hero squares */';
            if (!text.includes(cssMarker)) {
              const css = `

    /* Filled hero squares */
    .scan {
      position: relative;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 6px;
      padding: 12px;
      text-align: center;
      isolation: isolate;
    }
    .scan::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(15,31,31,.08), rgba(15,31,31,.38));
      z-index: -1;
    }
    .scan span {
      color: rgba(255,252,244,.82);
      font-size: .72rem;
      font-weight: 760;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .scan small {
      color: var(--cream);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.52rem;
      line-height: 1;
    }
    @media (max-width: 640px) {
      .scan small { font-size: 1.35rem; }
      .scan span { font-size: .68rem; }
    }
`;
              text = text.replace('</style>', css + '\n  </style>');
              changed = true;
            }

            if (!changed) {
              core.info('No changes needed.');
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              message: 'Fill hero clinical map squares',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: file.data.sha
            });
