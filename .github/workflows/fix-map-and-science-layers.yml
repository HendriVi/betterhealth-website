name: Fix Map And Science Layers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Patch homepage map and science page
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';

            async function readFile(path) {
              const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              return { sha: file.data.sha, text: Buffer.from(file.data.content, 'base64').toString('utf8') };
            }

            async function writeFile(path, sha, text, message) {
              await github.rest.repos.createOrUpdateFileContents({
                owner,
                repo,
                path,
                branch,
                message,
                content: Buffer.from(text, 'utf8').toString('base64'),
                sha
              });
            }

            let homepage = await readFile('index.html');
            let index = homepage.text;
            let indexChanged = false;

            const mapFixCss = `

    /* Clinical map readability fix */
    .console {
      z-index: 4;
    }

    .console-head {
      flex-wrap: wrap;
      align-items: flex-start;
      row-gap: 8px;
      line-height: 1.25;
    }

    .console-head span {
      min-width: 0;
      display: inline-flex;
      align-items: center;
    }

    .console-head span:first-child {
      flex: 1 1 230px;
    }

    .console-head span:last-child {
      flex: 0 0 auto;
      white-space: nowrap;
      text-align: right;
    }

    .protocol-card {
      z-index: 2;
      top: 286px;
    }

    @media (max-width: 680px) {
      .console-head {
        display: grid;
        gap: 8px;
      }
      .console-head span:last-child {
        white-space: normal;
        text-align: left;
      }
    }
`;

            if (!index.includes('Clinical map readability fix')) {
              index = index.replace('</style>', mapFixCss + '\n  </style>');
              indexChanged = true;
            }

            if (indexChanged) {
              await writeFile('index.html', homepage.sha, index, 'Fix clinical map readability');
            }

            let scienceFile = await readFile('science.html');
            let science = scienceFile.text;
            let scienceChanged = false;

            const layerCss = `

    .layer-explorer{display:grid;grid-template-columns:minmax(220px,.72fr) minmax(0,1.28fr);gap:18px;margin-top:30px;align-items:start}
    .layer-buttons{display:grid;gap:10px;position:sticky;top:92px}
    .layer-button{width:100%;border:1px solid rgba(15,31,31,.13);border-radius:999px;padding:13px 15px;text-align:left;background:rgba(255,252,244,.68);color:rgba(15,31,31,.76);cursor:pointer;font-weight:740;transition:background .2s ease,transform .2s ease,color .2s ease,border-color .2s ease}
    .layer-button:hover{transform:translateY(-1px);background:rgba(255,252,244,.9)}
    .layer-button.active{color:var(--cream);background:var(--deep);border-color:var(--deep)}
    .layer-panel{min-height:430px;padding:28px;border:1px solid var(--line);border-radius:22px;background:rgba(255,252,244,.76);box-shadow:0 22px 66px rgba(15,31,31,.1)}
    .layer-panel-top{display:grid;grid-template-columns:64px 1fr;gap:18px;align-items:center;margin-bottom:18px}
    .layer-symbol{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;color:var(--cream);background:conic-gradient(from 210deg,var(--deep),#2c6862,var(--gold),var(--deep));font-family:Georgia,'Times New Roman',serif;font-size:1.65rem}
    .layer-kicker{display:block;margin-bottom:6px;color:var(--sage);font-size:.78rem;font-weight:760;letter-spacing:.12em;text-transform:uppercase}
    .layer-panel h3{margin-bottom:0;font-family:Georgia,'Times New Roman',serif;font-size:clamp(1.8rem,3vw,2.65rem);line-height:1.05;font-weight:500}
    .layer-body{max-width:780px;color:#394a47;font-size:1.04rem;line-height:1.68}
    .layer-detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:24px}
    .layer-detail{padding:18px;border:1px solid rgba(15,31,31,.1);border-radius:16px;background:rgba(21,53,51,.045)}
    .layer-detail h4{margin:0 0 8px;color:var(--deep);font-size:.78rem;font-weight:780;letter-spacing:.1em;text-transform:uppercase}
    .layer-detail p{margin:0;color:var(--muted);font-size:.94rem;line-height:1.55}
    @media(max-width:860px){.layer-explorer{grid-template-columns:1fr}.layer-buttons{position:static;display:flex;gap:8px;overflow-x:auto;margin-inline:-20px;padding:0 20px 6px;-webkit-overflow-scrolling:touch}.layer-button{flex:0 0 auto;width:auto;white-space:nowrap}.layer-panel{padding:22px}.layer-detail-grid{grid-template-columns:1fr}.layer-panel-top{grid-template-columns:52px 1fr}.layer-symbol{width:52px;height:52px;font-size:1.35rem}}
`;

            if (!science.includes('.layer-explorer')) {
              science = science.replace('</style>', layerCss + '\n  </style>');
              scienceChanged = true;
            }

            const layerHtml = `
    <section class="section soft" id="interactive-layers">
      <div class="shell">
        <div class="section-kicker" data-i18n="layers_kicker">Interactive scientific layers</div>
        <h2 class="section-title" data-i18n="layers_title">Tap a layer and see how it changes the case.</h2>
        <p class="section-copy" data-i18n="layers_copy">Each scientific layer answers a different clinical question. The value is not in naming more systems. The value is in knowing which system may be maintaining the current state, what would suggest it, what can be measured and what can be changed.</p>
        <div class="layer-explorer">
          <div class="layer-buttons" role="tablist" aria-label="Scientific layers">
            <button class="layer-button active" type="button" data-layer="prediction" role="tab" aria-selected="true">Prediction</button>
            <button class="layer-button" type="button" data-layer="mitochondria" role="tab">Mitochondria</button>
            <button class="layer-button" type="button" data-layer="allostasis" role="tab">Allostatic load</button>
            <button class="layer-button" type="button" data-layer="sleep" role="tab">Sleep</button>
            <button class="layer-button" type="button" data-layer="inflammation" role="tab">Inflammation</button>
            <button class="layer-button" type="button" data-layer="metabolism" role="tab">Metabolism</button>
            <button class="layer-button" type="button" data-layer="autonomic" role="tab">Autonomic system</button>
            <button class="layer-button" type="button" data-layer="mismatch" role="tab">Evolutionary mismatch</button>
            <button class="layer-button" type="button" data-layer="therapy" role="tab">Psychotherapy</button>
          </div>
          <article class="layer-panel" aria-live="polite">
            <div class="layer-panel-top">
              <div class="layer-symbol" id="layerSymbol">P</div>
              <div><span class="layer-kicker" id="layerKicker">Layer 01</span><h3 id="layerTitle">Prediction shapes perception.</h3></div>
            </div>
            <p class="layer-body" id="layerBody">The brain predicts threat, safety, effort and control. A changed body state can make the same world feel more dangerous, exhausting or impossible to act in.</p>
            <div class="layer-detail-grid">
              <div class="layer-detail"><h4 id="layerSignsLabel">What may suggest it</h4><p id="layerSigns">Panic, avoidance, interoceptive fear, rumination, trauma history or a constant sense that the body is unsafe.</p></div>
              <div class="layer-detail"><h4 id="layerSignalsLabel">What can be measured</h4><p id="layerSignals">Clinical interview, avoidance map, symptom scores, sleep and autonomic context.</p></div>
              <div class="layer-detail"><h4 id="layerChangesLabel">What treatment can target</h4><p id="layerChanges">Psychotherapy, exposure design, HRV work, sleep repair and behavior experiments that update prediction.</p></div>
            </div>
          </article>
        </div>
      </div>
    </section>
`;

            if (!science.includes('id="interactive-layers"')) {
              const marker = '    <section class="section soft">\n      <div class="shell">\n        <div class="section-kicker" data-i18n="algorithm_kicker">The clinical algorithm</div>';
              if (!science.includes(marker)) {
                core.setFailed('Could not find science layer insertion point.');
                return;
              }
              science = science.replace(marker, layerHtml + '\n' + marker);
              scienceChanged = true;
            }

            const deLayerTranslations = "layers_kicker:'Interaktive Wissenschaft', layers_title:'Tippen Sie auf eine Ebene und sehen Sie, wie sie den Fall verändert.', layers_copy:'Jede wissenschaftliche Ebene beantwortet eine andere klinische Frage. Der Wert liegt nicht darin, mehr Systeme zu benennen. Der Wert liegt darin zu erkennen, welches System den Zustand aufrechterhalten könnte, was darauf hinweist, was messbar ist und was verändert werden kann.', ";
            if (!science.includes('layers_kicker:')) {
              science = science.replace("algorithm_kicker:'Der klinische Algorithmus'", deLayerTranslations + "algorithm_kicker:'Der klinische Algorithmus'");
              scienceChanged = true;
            }

            const layerScript = `
    let activeScienceLayer = 'prediction';
    const scienceLayerCopy = {
      en: {
        labels: { signs: 'What may suggest it', signals: 'What can be measured', changes: 'What treatment can target' },
        prediction: { label: 'Prediction', icon: 'P', kicker: 'Layer 01', title: 'Prediction shapes perception.', body: 'The brain predicts threat, safety, effort and control. A changed body state can make the same world feel more dangerous, exhausting or impossible to act in.', signs: 'Panic, avoidance, interoceptive fear, rumination, trauma history or a constant sense that the body is unsafe.', signals: 'Clinical interview, avoidance map, symptom scores, sleep pattern and autonomic context.', changes: 'Psychotherapy, exposure design, HRV work, sleep repair and behavior experiments that update prediction.' },
        mitochondria: { label: 'Mitochondria', icon: 'M', kicker: 'Layer 02', title: 'Energy capacity changes recovery.', body: 'Mitochondria are not only energy producers. They are stress and repair hubs. When demand is high and recovery is weak, the person may feel cognitively slow, physically depleted and unable to adapt.', signs: 'Post-exertional crashes, poor recovery, chronic overload, exercise intolerance, cognitive fatigue or repeated relapse after stress.', signals: 'VO2 max, sleep and recovery metrics, metabolic markers, inflammation markers and selected mitochondrial signals when clinically meaningful.', changes: 'Training dose, nutrition, sleep, oxygen physiology, pacing, recovery architecture and treatment of medical drivers.' },
        allostasis: { label: 'Allostatic load', icon: 'A', kicker: 'Layer 03', title: 'Stress becomes biology when adaptation becomes costly.', body: 'Allostatic load describes the cumulative cost of keeping the system stable under repeated demand. It links psychology, autonomic tone, endocrine rhythm, immunity, metabolism and behavior.', signs: 'Long-term stress exposure, burnout, insomnia, irritability, hypertension, inflammatory signals, metabolic drift or loss of recovery.', signals: 'Resting heart rate, blood pressure, HRV, sleep, cortisol rhythm when useful, inflammatory and metabolic markers, symptom and function tracking.', changes: 'Reduce load, rebuild rhythm, treat sleep, improve fitness, address avoidance and create a plan the nervous system can actually sustain.' },
        sleep: { label: 'Sleep', icon: 'S', kicker: 'Layer 04', title: 'Sleep is the recovery architecture of the brain.', body: 'Sleep regulates emotional control, threat reactivity, memory, metabolism, inflammation and cognitive clarity. When sleep breaks, symptoms can look psychiatric while being partly physiological.', signs: 'Insomnia, early waking, non-restorative sleep, apnea risk, morning anxiety, daytime sleepiness, brain fog or emotional volatility.', signals: 'Sleep diary, actigraphy, screening tools, nocturnal oxygen data, home sleep testing or polysomnography when indicated.', changes: 'CBT-I, circadian repair, apnea treatment, light timing, training timing, medication review and behavioral rhythm.' },
        inflammation: { label: 'Inflammation', icon: 'I', kicker: 'Layer 05', title: 'Immune signals can change mood, energy and motivation.', body: 'Inflammation can influence sickness behavior, anhedonia, pain, fatigue and cognitive slowing. The clinical question is whether immune activity is relevant enough to change the plan.', signs: 'Fatigue, anhedonia, pain, autoimmune context, post-infectious change, inflammatory disease, obesity or treatment-resistant depressive symptoms.', signals: 'hs-CRP, ESR, CBC, ferritin and targeted medical workup when history, examination or risk profile supports it.', changes: 'Medical treatment of underlying causes, sleep, diet, metabolic improvement, exercise dosing, stress regulation and specialist referral when needed.' },
        metabolism: { label: 'Metabolism', icon: 'G', kicker: 'Layer 06', title: 'Metabolic state affects brain function.', body: 'Glucose regulation, vascular risk, body composition and fitness influence energy delivery, inflammation and cognitive performance. Brain fog and low mood can sometimes sit inside this layer.', signs: 'Weight gain, low fitness, fatigue after meals, family risk, hypertension, poor recovery, brain fog or vascular risk.', signals: 'HbA1c, fasting glucose and insulin, ApoB, Lp(a), blood pressure, body composition and VO2 max.', changes: 'Nutrition, training, weight strategy, glucose regulation, lipid risk management and cardiovascular prevention.' },
        autonomic: { label: 'Autonomic system', icon: 'V', kicker: 'Layer 07', title: 'The body can get stuck in defensive readiness.', body: 'The autonomic nervous system regulates arousal, heart rate, breathing, digestion and recovery. When threat physiology dominates, the person may feel unsafe even in objectively safe contexts.', signs: 'Panic, hypervigilance, bodily alarm, dizziness, palpitations, avoidance, poor recovery after stress or inability to downshift.', signals: 'HRV patterns, resting heart rate, orthostatic response, blood pressure, breathing pattern and clinical exposure map.', changes: 'HRV biofeedback, breathing work, graded exposure, sleep repair, movement, trauma therapy and reduction of chronic load.' },
        mismatch: { label: 'Evolutionary mismatch', icon: 'E', kicker: 'Layer 08', title: 'Modern conditions can overload older regulatory systems.', body: 'Light at night, digital urgency, isolation, ultra-processed food, sedentary work and sleep compression can create a mismatch between the environment and the body systems regulating mood and recovery.', signs: 'Collapsed routine, fragmented attention, late light, irregular meals, low movement, social isolation, chronic urgency or sleep debt.', signals: 'Chronology, rhythm map, light exposure, movement pattern, diet pattern, work demand and social context.', changes: 'Circadian structure, movement, nutrition, social rhythm, digital boundaries, sleep timing and environmental redesign.' },
        therapy: { label: 'Psychotherapy', icon: 'T', kicker: 'Layer 09', title: 'Prediction changes through lived experience.', body: 'Psychotherapy remains central because symptoms also live in meaning, memory, avoidance, relationship and agency. The biological map supports therapy rather than replacing it.', signs: 'Avoidance, trauma, grief, shame, loss of agency, rigid threat beliefs, relational stress or patterns that repeat despite insight.', signals: 'Clinical formulation, avoidance map, symptom and function scores, therapy process and lived behavioral data.', changes: 'CBT, ACT, exposure, trauma work, mentalization, behavioral activation and real-world learning that updates prediction.' }
      },
      de: {
        labels: { signs: 'Was darauf hinweisen kann', signals: 'Was messbar ist', changes: 'Was Behandlung adressieren kann' },
        prediction: { label: 'Vorhersage', icon: 'P', kicker: 'Ebene 01', title: 'Vorhersage formt Wahrnehmung.', body: 'Das Gehirn sagt Bedrohung, Sicherheit, Aufwand und Kontrolle voraus. Ein veränderter Körperzustand kann dieselbe Welt gefährlicher, erschöpfender oder weniger handhabbar erscheinen lassen.', signs: 'Panik, Vermeidung, interozeptive Angst, Grübeln, Trauma-Anamnese oder ein ständiges Gefühl körperlicher Unsicherheit.', signals: 'Klinisches Gespräch, Vermeidungskarte, Symptomwerte, Schlafmuster und autonomer Kontext.', changes: 'Psychotherapie, Expositionsdesign, HRV-Arbeit, Schlafreparatur und Verhaltensexperimente, die Vorhersagen aktualisieren.' },
        mitochondria: { label: 'Mitochondrien', icon: 'M', kicker: 'Ebene 02', title: 'Energiekapazität verändert Erholung.', body: 'Mitochondrien produzieren Energie und wirken als Stress- und Reparaturzentren. Bei hoher Nachfrage und schwacher Erholung kann ein Mensch kognitiv langsam, körperlich erschöpft und weniger anpassungsfähig werden.', signs: 'Einbrüche nach Belastung, schlechte Erholung, chronische Überlastung, Belastungsintoleranz, kognitive Müdigkeit oder Rückfälle nach Stress.', signals: 'VO2max, Schlaf- und Erholungsmetriken, metabolische Marker, Entzündungsmarker und ausgewählte mitochondriale Signale, wenn klinisch sinnvoll.', changes: 'Trainingsdosis, Ernährung, Schlaf, Sauerstoffphysiologie, Pacing, Erholungsarchitektur und Behandlung medizinischer Treiber.' },
        allostasis: { label: 'Allostatische Last', icon: 'A', kicker: 'Ebene 03', title: 'Stress wird biologisch, wenn Anpassung kostet.', body: 'Allostatische Last beschreibt die kumulativen Kosten, die entstehen, wenn das System unter wiederholter Anforderung stabil bleiben muss. Sie verbindet Psyche, autonomes System, Hormone, Immunität, Stoffwechsel und Verhalten.', signs: 'Langzeitstress, Burnout, Insomnie, Reizbarkeit, Bluthochdruck, Entzündungssignale, metabolische Verschiebung oder Verlust von Erholung.', signals: 'Ruhepuls, Blutdruck, HRV, Schlaf, Cortisolrhythmus wenn sinnvoll, Entzündungs- und Stoffwechselmarker, Symptom- und Funktionsverlauf.', changes: 'Last reduzieren, Rhythmus aufbauen, Schlaf behandeln, Fitness verbessern, Vermeidung bearbeiten und einen Plan schaffen, den das Nervensystem tragen kann.' },
        sleep: { label: 'Schlaf', icon: 'S', kicker: 'Ebene 04', title: 'Schlaf ist die Erholungsarchitektur des Gehirns.', body: 'Schlaf reguliert Emotionskontrolle, Bedrohungsreaktivität, Gedächtnis, Stoffwechsel, Entzündung und kognitive Klarheit. Wenn Schlaf bricht, können Symptome psychiatrisch aussehen und zugleich physiologisch mitgetragen sein.', signs: 'Insomnie, frühes Erwachen, nicht erholsamer Schlaf, Apnoe-Risiko, Morgenangst, Tagesschläfrigkeit, Brain Fog oder emotionale Instabilität.', signals: 'Schlaftagebuch, Aktigraphie, Screening-Tools, nächtliche Sauerstoffdaten, Heim-Schlaftest oder Polysomnographie bei Indikation.', changes: 'CBT-I, zirkadiane Reparatur, Apnoe-Behandlung, Licht-Timing, Trainings-Timing, Medikamentenprüfung und Verhaltensrhythmus.' },
        inflammation: { label: 'Entzündung', icon: 'I', kicker: 'Ebene 05', title: 'Immunsignale können Stimmung, Energie und Motivation verändern.', body: 'Entzündung kann Krankheitsverhalten, Anhedonie, Schmerz, Müdigkeit und kognitive Verlangsamung beeinflussen. Die klinische Frage ist, ob Immunaktivität relevant genug ist, um den Plan zu verändern.', signs: 'Müdigkeit, Anhedonie, Schmerz, Autoimmun-Kontext, postinfektiöse Veränderung, entzündliche Erkrankung, Adipositas oder therapieresistente depressive Symptome.', signals: 'hs-CRP, BSG, Blutbild, Ferritin und gezielte medizinische Abklärung, wenn Anamnese, Untersuchung oder Risikoprofil dafür sprechen.', changes: 'Medizinische Behandlung zugrunde liegender Ursachen, Schlaf, Ernährung, metabolische Verbesserung, Bewegungsdosis, Stressregulation und Zuweisung bei Bedarf.' },
        metabolism: { label: 'Stoffwechsel', icon: 'G', kicker: 'Ebene 06', title: 'Der Stoffwechselzustand beeinflusst Gehirnfunktion.', body: 'Glukoseregulation, vaskuläres Risiko, Körperzusammensetzung und Fitness beeinflussen Energieversorgung, Entzündung und kognitive Leistung. Brain Fog und gedrückte Stimmung können teilweise in dieser Ebene liegen.', signs: 'Gewichtszunahme, niedrige Fitness, Müdigkeit nach Mahlzeiten, familiäres Risiko, Bluthochdruck, schlechte Erholung, Brain Fog oder vaskuläres Risiko.', signals: 'HbA1c, Nüchternglukose und Insulin, ApoB, Lp(a), Blutdruck, Körperzusammensetzung und VO2max.', changes: 'Ernährung, Training, Gewichtsstrategie, Glukoseregulation, Lipidrisiko-Management und kardiovaskuläre Prävention.' },
        autonomic: { label: 'Autonomes System', icon: 'V', kicker: 'Ebene 07', title: 'Der Körper kann in defensiver Bereitschaft stecken bleiben.', body: 'Das autonome Nervensystem reguliert Erregung, Herzrate, Atmung, Verdauung und Erholung. Wenn Bedrohungsphysiologie dominiert, kann ein Mensch sich selbst in sicherer Umgebung unsicher fühlen.', signs: 'Panik, Hypervigilanz, körperlicher Alarm, Schwindel, Palpitationen, Vermeidung, schlechte Erholung nach Stress oder fehlendes Herunterregulieren.', signals: 'HRV-Muster, Ruhepuls, orthostatische Reaktion, Blutdruck, Atemmuster und klinische Expositionskarte.', changes: 'HRV-Biofeedback, Atemarbeit, graduierte Exposition, Schlafreparatur, Bewegung, Traumatherapie und Reduktion chronischer Last.' },
        mismatch: { label: 'Evolutionärer Mismatch', icon: 'E', kicker: 'Ebene 08', title: 'Moderne Bedingungen können ältere Regulationssysteme überlasten.', body: 'Licht in der Nacht, digitale Dringlichkeit, Isolation, hochverarbeitete Nahrung, sitzende Arbeit und Schlafverkürzung können eine Fehlpassung zwischen Umwelt und den Systemen schaffen, die Stimmung und Erholung regulieren.', signs: 'Zusammengebrochene Routine, fragmentierte Aufmerksamkeit, spätes Licht, unregelmäßige Mahlzeiten, wenig Bewegung, soziale Isolation, chronische Dringlichkeit oder Schlafschuld.', signals: 'Chronologie, Rhythmuskarte, Lichtexposition, Bewegungsmuster, Ernährungsmuster, Arbeitslast und sozialer Kontext.', changes: 'Zirkadiane Struktur, Bewegung, Ernährung, sozialer Rhythmus, digitale Grenzen, Schlaf-Timing und Umweltgestaltung.' },
        therapy: { label: 'Psychotherapie', icon: 'T', kicker: 'Ebene 09', title: 'Vorhersage verändert sich durch gelebte Erfahrung.', body: 'Psychotherapie bleibt zentral, weil Symptome auch in Bedeutung, Erinnerung, Vermeidung, Beziehung und Handlungsmacht leben. Die biologische Karte unterstützt Therapie, sie ersetzt sie nicht.', signs: 'Vermeidung, Trauma, Trauer, Scham, Verlust von Handlungsmacht, starre Bedrohungsüberzeugungen, Beziehungsstress oder Muster, die trotz Einsicht wiederkehren.', signals: 'Klinische Formulierung, Vermeidungskarte, Symptom- und Funktionsscores, Therapieprozess und gelebte Verhaltensdaten.', changes: 'CBT, ACT, Exposition, Traumaarbeit, Mentalisierung, Verhaltensaktivierung und reales Lernen, das Vorhersagen aktualisiert.' }
      }
    };
    function renderScienceLayer(key = activeScienceLayer){
      activeScienceLayer = key;
      const language = activeLanguage === 'de' ? 'de' : 'en';
      const pack = scienceLayerCopy[language];
      const layer = pack[key] || pack.prediction;
      const setText = (id, value) => { const element = document.getElementById(id); if(element) element.textContent = value; };
      setText('layerSymbol', layer.icon);
      setText('layerKicker', layer.kicker);
      setText('layerTitle', layer.title);
      setText('layerBody', layer.body);
      setText('layerSignsLabel', pack.labels.signs);
      setText('layerSignalsLabel', pack.labels.signals);
      setText('layerChangesLabel', pack.labels.changes);
      setText('layerSigns', layer.signs);
      setText('layerSignals', layer.signals);
      setText('layerChanges', layer.changes);
      document.querySelectorAll('.layer-button').forEach((button)=>{
        const data = pack[button.dataset.layer];
        if(data) button.textContent = data.label;
        const active = button.dataset.layer === activeScienceLayer;
        button.classList.toggle('active', active);
        button.setAttribute('aria-selected', active ? 'true' : 'false');
      });
    }
`;

            if (!science.includes('scienceLayerCopy')) {
              science = science.replace("let activeLanguage = 'en';", "let activeLanguage = 'en';\n" + layerScript);
              science = science.replace("document.querySelectorAll('.lang-toggle button').forEach((button)=>button.classList.toggle('active', button.dataset.lang === language));", "document.querySelectorAll('.lang-toggle button').forEach((button)=>button.classList.toggle('active', button.dataset.lang === language));\n      renderScienceLayer(activeScienceLayer);");
              const setupMarker = "document.querySelectorAll('.lang-toggle button').forEach((button)=>button.addEventListener('click',()=>applyLanguage(button.dataset.lang)));";
              const setup = setupMarker + "\n    document.querySelectorAll('.layer-button').forEach((button)=>button.addEventListener('click',()=>renderScienceLayer(button.dataset.layer)));\n    renderScienceLayer(activeScienceLayer);";
              science = science.replace(setupMarker, setup);
              scienceChanged = true;
            }

            if (scienceChanged) {
              await writeFile('science.html', scienceFile.sha, science, 'Add tappable science layers');
            }
