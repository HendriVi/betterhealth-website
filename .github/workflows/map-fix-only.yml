name: Map Fix Only

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Fix clinical map layout
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const path = 'index.html';
            const branch = 'main';
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(file.data.content, 'base64').toString('utf8');
            if (text.includes('Clinical map readability fix')) {
              core.info('Already fixed.');
              return;
            }
            const css = `

    /* Clinical map readability fix */
    .console { z-index: 4; }
    .console-head { flex-wrap: wrap; align-items: flex-start; row-gap: 8px; line-height: 1.25; }
    .console-head span { min-width: 0; display: inline-flex; align-items: center; }
    .console-head span:first-child { flex: 1 1 230px; }
    .console-head span:last-child { flex: 0 0 auto; white-space: nowrap; text-align: right; }
    .protocol-card { z-index: 2; top: 286px; }
    @media (max-width: 680px) {
      .console-head { display: grid; gap: 8px; }
      .console-head span:last-child { white-space: normal; text-align: left; }
    }
`;
            text = text.replace('</style>', css + '\n  </style>');
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch,
              message: 'Fix clinical map graphic overlap',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: file.data.sha
            });
