name: Mobile Final Patch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Patch index.html through API
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const path = 'index.html';
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(file.data.content, 'base64').toString('utf8');
            let changed = false;
            const dec = (s) => Buffer.from(s, 'base64').toString('utf8');
            const css = dec('');
            const journey = dec('');
            const bar = dec('');
            const js = dec('');
            if (!text.includes('six-month-journey')) { text = text.replace('</style>', css + '\n  </style>'); changed = true; }
            if (!text.includes('science_mobile_hint')) { text = text.replace('<div class="science-grid">', '<p class="mobile-accordion-hint" data-i18n="science_mobile_hint">Tap a card to open the explanation.</p>\n        <div class="science-grid">'); changed = true; }
            if (!text.includes('six-month-journey reveal')) { text = text.replace(/(<div class="self-pay-note" data-i18n="self_pay_note">[\s\S]*?<\/div>)(\s*<\/div>\s*<\/section>)/, '$1' + journey + '$2'); changed = true; }
            if (!text.includes('Mobile quick actions')) { text = text.replace('<footer class="footer">', bar + '\n  <footer class="footer">'); changed = true; }
            if (!text.includes('setupMobileScienceAccordions')) { text = text.replace('</script>', js + '</script>'); changed = true; }
            if (!changed) { core.info('Already patched.'); return; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, branch, message: 'Add mobile interactions and six-month journey', content: Buffer.from(text, 'utf8').toString('base64'), sha: file.data.sha });
