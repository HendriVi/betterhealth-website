name: Mobile German Patch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Add German mobile translations
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = 'main';
            const path = 'index.html';
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(file.data.content, 'base64').toString('utf8');
            if (text.includes('journey_kicker:')) { core.info('Translations already present.'); return; }
            const german = Buffer.from('', 'base64').toString('utf8');
            const next = text.replace(/(self_pay_note: "[^"]+",\n)/, '$1' + german);
            if (next === text) { core.setFailed('Could not find translation marker.'); return; }
            await github.rest.repos.createOrUpdateFileContents({ owner, repo, path, branch, message: 'Add German mobile journey translations', content: Buffer.from(next, 'utf8').toString('base64'), sha: file.data.sha });
