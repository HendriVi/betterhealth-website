name: Patch Homepage Science Button

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Patch index.html through GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const path = 'index.html';
            const branch = 'main';

            const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(file.data.content, 'base64').toString('utf8');
            let changed = false;

            if (!text.includes('data-i18n="science_more"')) {
              const marker = '        </div>\n      </div>\n    </section>\n\n    <section class="section soft" id="programs">';
              const insert = '        </div>\n        <div class="section-actions science-more reveal" style="margin-top: 28px;">\n          <a class="btn btn-primary" href="science.html" data-i18n="science_more">More</a>\n        </div>\n      </div>\n    </section>\n\n    <section class="section soft" id="programs">';

              if (!text.includes(marker)) {
                core.setFailed('Could not find the science section marker in index.html.');
                return;
              }

              text = text.replace(marker, insert);
              changed = true;
            }

            if (!text.includes('science_more:')) {
              const before = text;
              text = text.replace(/(        science_copy: "[^\n]+",\n)/, '$1        science_more: "Mehr",\n');
              if (text !== before) changed = true;
            }

            if (!changed) {
              core.info('Science More button already exists.');
              return;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch,
              message: 'Add More button to science section',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: file.data.sha
            });

            core.info('Science More button added to homepage.');
