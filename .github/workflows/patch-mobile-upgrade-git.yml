name: Patch Mobile Upgrade Git

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch index.html
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          changed = False

          css = '''

    .six-month-journey {
      margin-top: 30px;
      padding: 24px;
      border: 1px solid rgba(15, 31, 31, .1);
      border-radius: 14px;
      background: rgba(255, 252, 244, .72);
    }

    .six-month-journey > h3 {
      margin-bottom: 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.75rem;
      line-height: 1.08;
      font-weight: 500;
    }

    .six-month-journey > p {
      max-width: 820px;
      color: var(--muted);
    }

    .journey-track {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-top: 22px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }

    .journey-step {
      min-width: 190px;
      padding: 18px;
      border-radius: 12px;
      background: rgba(21, 53, 51, .055);
      border: 1px solid rgba(15, 31, 31, .08);
      scroll-snap-align: start;
    }

    .journey-step span {
      display: block;
      margin-bottom: 12px;
      color: var(--sage);
      font-size: .76rem;
      font-weight: 760;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .journey-step h3 {
      margin-bottom: 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.28rem;
      line-height: 1.08;
      font-weight: 500;
    }

    .journey-step p {
      margin-bottom: 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .mobile-accordion-hint,
    .mobile-action-bar {
      display: none;
    }

    @media (max-width: 980px) {
      body { padding-bottom: 86px; }
      .mobile-action-bar {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 40;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 7px;
        border: 1px solid rgba(15, 31, 31, .14);
        border-radius: 999px;
        background: rgba(255, 252, 244, .92);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 50px rgba(15, 31, 31, .18);
      }
      .mobile-action-bar a {
        min-height: 42px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: var(--deep);
        font-size: .86rem;
        font-weight: 740;
      }
      .mobile-action-bar a:last-child {
        color: var(--cream);
        background: var(--deep);
      }
      .journey-track {
        display: flex;
        gap: 12px;
        margin-inline: -13px;
        padding: 0 13px 10px;
      }
      .journey-step {
        flex: 0 0 78%;
        min-width: 260px;
      }
      .mobile-accordion-hint {
        display: block;
        margin-top: 18px;
        color: var(--muted);
        font-size: .92rem;
      }
      .science-card { cursor: pointer; }
      .science-card p {
        max-height: 0;
        margin-bottom: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-height .25s ease, opacity .2s ease, margin .2s ease;
      }
      .science-card.open p {
        max-height: 260px;
        margin-top: 8px;
        opacity: 1;
      }
      .science-card h3::after {
        content: "+";
        float: right;
        color: var(--sage);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 1rem;
      }
      .science-card.open h3::after { content: "–"; }
    }
'''
          if '.six-month-journey' not in text:
              text = text.replace('</style>', css + '\n  </style>')
              changed = True

          if 'science_mobile_hint' not in text:
              text = text.replace('<div class="science-grid">', '<p class="mobile-accordion-hint" data-i18n="science_mobile_hint">Tap a card to open the explanation.</p>\n        <div class="science-grid">', 1)
              changed = True

          journey = '''
        <div class="six-month-journey reveal" aria-label="Six-month treatment journey">
          <div class="section-kicker" data-i18n="journey_kicker">Six-month journey</div>
          <h3 data-i18n="journey_title">What the six-month treatment program actually does.</h3>
          <p data-i18n="journey_copy">The program is built as a sequence: first understand the case, then test the most relevant systems, then implement the plan and recalibrate when the body, symptoms and function do not move together.</p>
          <div class="journey-track">
            <article class="journey-step"><span data-i18n="journey_m0">Month 0</span><h3 data-i18n="journey_m0_title">Clinical intake</h3><p data-i18n="journey_m0_copy">Symptoms, diagnosis, chronology, risk, previous treatments and the point where recovery stopped.</p></article>
            <article class="journey-step"><span data-i18n="journey_m1">Month 1</span><h3 data-i18n="journey_m1_title">System map</h3><p data-i18n="journey_m1_copy">Sleep, metabolism, inflammation, hormones, autonomic load, cognition and recovery are ranked by clinical relevance.</p></article>
            <article class="journey-step"><span data-i18n="journey_m2">Month 2</span><h3 data-i18n="journey_m2_title">Treatment design</h3><p data-i18n="journey_m2_copy">Psychotherapy, physiology, sleep, nutrition, training and selected modalities are matched to the dominant systems.</p></article>
            <article class="journey-step"><span data-i18n="journey_m34">Months 3–4</span><h3 data-i18n="journey_m34_title">Implementation</h3><p data-i18n="journey_m34_copy">The plan is carried into daily life and adjusted around adherence, symptom response, recovery and function.</p></article>
            <article class="journey-step"><span data-i18n="journey_m5">Month 5</span><h3 data-i18n="journey_m5_title">Recalibration</h3><p data-i18n="journey_m5_copy">What moved, what did not move and which second hypothesis now deserves attention.</p></article>
            <article class="journey-step"><span data-i18n="journey_m6">Month 6</span><h3 data-i18n="journey_m6_title">Long-term plan</h3><p data-i18n="journey_m6_copy">Measured progress becomes a sustainable strategy for mental health, brain function and prevention.</p></article>
          </div>
        </div>
'''
          if 'six-month-journey reveal' not in text:
              text = re.sub(r'(<div class="self-pay-note" data-i18n="self_pay_note">[\s\S]*?</div>)(\s*</div>\s*</section>)', r'\1' + journey + r'\2', text, count=1)
              changed = True

          mobile_bar = '''
  <div class="mobile-action-bar" aria-label="Mobile quick actions">
    <a href="#programs" data-i18n="mobile_programs">Programs</a>
    <a href="#science" data-i18n="mobile_science">Science</a>
    <a href="#contact" data-i18n="mobile_call">Call</a>
  </div>
'''
          if 'Mobile quick actions' not in text:
              text = text.replace('<footer class="footer">', mobile_bar + '\n  <footer class="footer">', 1)
              changed = True

          german = '''        science_mobile_hint: "Tippen Sie auf eine Karte, um die Erklärung zu öffnen.",
        mobile_programs: "Programme",
        mobile_science: "Wissenschaft",
        mobile_call: "Call",
        journey_kicker: "Sechs-Monats-Weg",
        journey_title: "Was das sechsmonatige Behandlungsprogramm tatsächlich leistet.",
        journey_copy: "Das Programm ist als Sequenz aufgebaut: zuerst den Fall verstehen, dann die wichtigsten Systeme prüfen, dann den Plan umsetzen und neu kalibrieren, wenn Körper, Symptome und Funktion nicht gemeinsam vorankommen.",
        journey_m0: "Monat 0",
        journey_m0_title: "Klinische Aufnahme",
        journey_m0_copy: "Symptome, Diagnose, Chronologie, Risiko, bisherige Behandlungen und der Punkt, an dem Erholung aufgehört hat.",
        journey_m1: "Monat 1",
        journey_m1_title: "Systemkarte",
        journey_m1_copy: "Schlaf, Stoffwechsel, Entzündung, Hormone, autonome Last, Kognition und Erholung werden nach klinischer Relevanz geordnet.",
        journey_m2: "Monat 2",
        journey_m2_title: "Therapiedesign",
        journey_m2_copy: "Psychotherapie, Physiologie, Schlaf, Ernährung, Training und ausgewählte Modalitäten werden auf die dominanten Systeme abgestimmt.",
        journey_m34: "Monate 3–4",
        journey_m34_title: "Umsetzung",
        journey_m34_copy: "Der Plan wird in den Alltag gebracht und anhand von Adhärenz, Symptomen, Erholung und Funktion angepasst.",
        journey_m5: "Monat 5",
        journey_m5_title: "Rekalibrierung",
        journey_m5_copy: "Was sich bewegt hat, was sich nicht bewegt hat und welche zweite Hypothese jetzt Aufmerksamkeit verdient.",
        journey_m6: "Monat 6",
        journey_m6_title: "Langfristiger Plan",
        journey_m6_copy: "Gemessener Fortschritt wird zu einer nachhaltigen Strategie für mentale Gesundheit, Gehirnfunktion und Prävention.",
'''
          if 'journey_kicker:' not in text:
              text = re.sub(r'(self_pay_note: "[^"]+",\n)', r'\1' + german, text, count=1)
              changed = True

          js = '''

    function setupMobileScienceAccordions() {
      const cards = document.querySelectorAll(".science-card");
      cards.forEach((card, index) => {
        if (!card.dataset.mobileAccordionReady) {
          card.dataset.mobileAccordionReady = "true";
          card.setAttribute("role", "button");
          card.setAttribute("tabindex", "0");
          card.addEventListener("click", () => {
            if (window.matchMedia("(max-width: 980px)").matches) {
              card.classList.toggle("open");
            }
          });
          card.addEventListener("keydown", (event) => {
            if ((event.key === "Enter" || event.key === " ") && window.matchMedia("(max-width: 980px)").matches) {
              event.preventDefault();
              card.classList.toggle("open");
            }
          });
        }
        if (index === 0 && window.matchMedia("(max-width: 980px)").matches && !document.querySelector(".science-card.open")) {
          card.classList.add("open");
        }
      });
    }

    setupMobileScienceAccordions();
    window.addEventListener("resize", setupMobileScienceAccordions);
'''
          if 'setupMobileScienceAccordions' not in text:
              pos = text.rfind('</script>')
              if pos != -1:
                  text = text[:pos] + js + text[pos:]
                  changed = True

          if changed:
              path.write_text(text, encoding='utf-8')
              print('Mobile upgrade patched.')
          else:
              print('No changes needed.')
          PY

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Add mobile interactions and six-month journey"
            git push
          fi
