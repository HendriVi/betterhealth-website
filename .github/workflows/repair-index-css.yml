name: Repair Index CSS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Repair corrupted mobile CSS and map overlap
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const path = 'index.html';
            const branch = 'main';
            const file = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
            let text = Buffer.from(file.data.content, 'base64').toString('utf8');
            const start = text.indexOf('      .mobile-action-bar { position: fixed; left');
            const end = text.indexOf('</style>', start);
            if (start === -1 || end === -1) {
              core.setFailed('Could not find corrupted CSS block.');
              return;
            }
            const replacement = `      .mobile-action-bar {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: 12px;
        z-index: 40;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 7px;
        border: 1px solid rgba(15, 31, 31, .14);
        border-radius: 999px;
        background: rgba(255, 252, 244, .92);
        backdrop-filter: blur(18px);
        box-shadow: 0 18px 50px rgba(15, 31, 31, .18);
      }

      .mobile-action-bar a {
        min-height: 42px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        color: var(--deep);
        font-size: .86rem;
        font-weight: 740;
      }

      .mobile-action-bar a:last-child {
        color: var(--cream);
        background: var(--deep);
      }

      .journey-track {
        display: flex;
        gap: 12px;
        margin-inline: -13px;
        padding: 0 13px 10px;
      }

      .journey-step {
        flex: 0 0 78%;
        min-width: 260px;
      }

      .mobile-accordion-hint {
        display: block;
        margin-top: 18px;
        color: var(--muted);
        font-size: .92rem;
      }

      .science-card { cursor: pointer; }

      .science-card p {
        max-height: 0;
        margin-bottom: 0;
        opacity: 0;
        overflow: hidden;
        transition: max-height .25s ease, opacity .2s ease, margin .2s ease;
      }

      .science-card.open p {
        max-height: 260px;
        margin-top: 8px;
        opacity: 1;
      }

      .science-card h3::after {
        content: "+";
        float: right;
        color: var(--sage);
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 1rem;
      }

      .science-card.open h3::after { content: "–"; }
    }

    /* Clinical map readability fix */
    .console { z-index: 4; }
    .console-head { flex-wrap: wrap; align-items: flex-start; row-gap: 8px; line-height: 1.25; }
    .console-head span { min-width: 0; display: inline-flex; align-items: center; }
    .console-head span:first-child { flex: 1 1 230px; }
    .console-head span:last-child { flex: 0 0 auto; white-space: nowrap; text-align: right; }
    .protocol-card { z-index: 2; top: 286px; }
    @media (max-width: 680px) {
      .console-head { display: grid; gap: 8px; }
      .console-head span:last-child { white-space: normal; text-align: left; }
    }

  `;
            text = text.slice(0, start) + replacement + text.slice(end);
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path, branch,
              message: 'Repair mobile CSS and clinical map overlap',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: file.data.sha
            });
